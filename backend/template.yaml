AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: OpenOptions — Options Mispricing Tracker API (MVP)

Globals:
  Function:
    Timeout: 120
    MemorySize: 512
    Runtime: python3.9
    Environment:
      Variables:
        DB_HOST: !Ref DBHost
        DB_PORT: !Ref DBPort
        DB_NAME: !Ref DBName
        DB_USER: !Ref DBUser
        DB_PASSWORD: !Ref DBPassword
        DERIBIT_CLIENT_ID: !Ref DeribitClientId
        DERIBIT_CLIENT_SECRET: !Ref DeribitClientSecret
        TASTYTRADE_CLIENT_ID: !Ref TastytradeClientId
        TASTYTRADE_CLIENT_SECRET: !Ref TastytradeClientSecret
        TASTYTRADE_REFRESH_TOKEN: !Ref TastytradeRefreshToken
        FRED_API_KEY: !Ref FredApiKey
        VOL_THRESHOLD: !Ref VolThreshold
        MARKET_TZ: 'America/New_York'
        ALLOWED_IPS_CSV: !Ref AllowedIpsCsv
        ENVIRONMENT: 'production'

Parameters:
  DBHost:
    Type: String
  DBPort:
    Type: String
    Default: '5432'
  DBName:
    Type: String
    Default: 'openoptions'
  DBUser:
    Type: String
    Default: 'postgres'
  DBPassword:
    Type: String
    NoEcho: true
  DeribitClientId:
    Type: String
    Default: ''
  DeribitClientSecret:
    Type: String
    NoEcho: true
    Default: ''
  TastytradeClientId:
    Type: String
    Default: ''
  TastytradeClientSecret:
    Type: String
    NoEcho: true
    Default: ''
  TastytradeRefreshToken:
    Type: String
    NoEcho: true
    Default: ''
  FredApiKey:
    Type: String
    Default: ''
  VolThreshold:
    Type: String
    Default: '2.0'
  AllowedIpsCsv:
    Type: String
    Default: ''
  AllowedOrigin:
    Type: String
    Default: '*'

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Description: FastAPI backend for OpenOptions
      Architectures:
        - arm64
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt ApiFunction.Arn
