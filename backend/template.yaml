AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: OpenOptions — Options Mispricing Tracker API (MVP)

Globals:
  Function:
    Timeout: 120
    MemorySize: 512
    Runtime: python3.9
    Environment:
      Variables:
        DB_HOST: !Ref DBHost
        DB_PORT: !Ref DBPort
        DB_NAME: !Ref DBName
        DB_USER: !Ref DBUser
        DB_PASSWORD: !Ref DBPassword
        DERIBIT_CLIENT_ID: !Ref DeribitClientId
        DERIBIT_CLIENT_SECRET: !Ref DeribitClientSecret
        TASTYTRADE_CLIENT_ID: !Ref TastytradeClientId
        TASTYTRADE_CLIENT_SECRET: !Ref TastytradeClientSecret
        TASTYTRADE_REFRESH_TOKEN: !Ref TastytradeRefreshToken
        FRED_API_KEY: !Ref FredApiKey
        VOL_THRESHOLD: !Ref VolThreshold
        MARKET_TZ: 'America/New_York'
        ALLOWED_IPS_CSV: !Ref AllowedIpsCsv
        ENVIRONMENT: 'production'

Parameters:
  DBHost:
    Type: String
  DBPort:
    Type: String
    Default: '5432'
  DBName:
    Type: String
    Default: 'openoptions'
  DBUser:
    Type: String
    Default: 'postgres'
  DBPassword:
    Type: String
    NoEcho: true
  DeribitClientId:
    Type: String
    Default: ''
  DeribitClientSecret:
    Type: String
    NoEcho: true
    Default: ''
  TastytradeClientId:
    Type: String
    Default: ''
  TastytradeClientSecret:
    Type: String
    NoEcho: true
    Default: ''
  TastytradeRefreshToken:
    Type: String
    NoEcho: true
    Default: ''
  FredApiKey:
    Type: String
    Default: ''
  VolThreshold:
    Type: String
    Default: '2.0'
  AllowedIpsCsv:
    Type: String
    Default: ''
  AllowedOrigin:
    Type: String
    Default: '*'
  SageMakerRoleArn:
    Type: String
    Default: ''
  SageMakerEcrImage:
    Type: String
    Default: ''
  MlS3Bucket:
    Type: String
    Default: 'openoptions-ml'
  MlPollerApiKey:
    Type: String
    NoEcho: true
    Default: ''
  NumeraiPublicId:
    Type: String
    Default: ''
  NumeraiSecretKey:
    Type: String
    NoEcho: true
    Default: ''
  NumeraiModelId:
    Type: String
    Default: ''

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Description: FastAPI backend for OpenOptions
      Architectures:
        - arm64
      Environment:
        Variables:
          SAGEMAKER_ROLE_ARN: !Ref SageMakerRoleArn
          SAGEMAKER_ECR_IMAGE: !Ref SageMakerEcrImage
          ML_S3_BUCKET: !Ref MlS3Bucket
          ML_POLLER_API_KEY: !Ref MlPollerApiKey
          NUMERAI_PUBLIC_ID: !Ref NumeraiPublicId
          NUMERAI_SECRET_KEY: !Ref NumeraiSecretKey
          NUMERAI_MODEL_ID: !Ref NumeraiModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sagemaker:CreateTrainingJob
                - sagemaker:DescribeTrainingJob
                - sagemaker:StopTrainingJob
              Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:training-job/oo-*'
            - Effect: Allow
              Action: iam:PassRole
              Resource: !Ref SageMakerRoleArn
              Condition:
                StringEquals:
                  iam:PassedToService: sagemaker.amazonaws.com
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub 'arn:aws:s3:::${MlS3Bucket}/*'
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

  # ── Poller Lambda ─────────────────────────────────────────────────

  PollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: sagemaker_poller/
      Description: Polls SageMaker job status and updates RDS
      Architectures:
        - arm64
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          ML_S3_BUCKET: !Ref MlS3Bucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sagemaker:DescribeTrainingJob
              Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:training-job/oo-*'
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !Sub 'arn:aws:s3:::${MlS3Bucket}'
                - !Sub 'arn:aws:s3:::${MlS3Bucket}/*'
      Events:
        PollSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Enabled: true

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt ApiFunction.Arn
  SageMakerRoleArn:
    Description: SageMaker execution role ARN
    Value: !Ref SageMakerRoleArn
  PollerFunctionArn:
    Description: Poller Lambda function ARN
    Value: !GetAtt PollerFunction.Arn
